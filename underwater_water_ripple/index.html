<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Underwater Water Ripple — codecomponentswithsande</title>
	<!-- credit: Hezron Sandé | github.com/Svnd3/codecomponentswithsande | @_svnd3 -->
	<link rel="stylesheet" href="./main.css">
</head>
<body>
	<section></section>
	<canvas id="bubble-canvas"></canvas>

	<script src="ripple.js"></script>
	<script>
		const section = document.querySelector('section');
		new WaterRipple(section, 'underwater.jpg');

		// Bubble particle system
		const bc = document.getElementById('bubble-canvas');
		const bctx = bc.getContext('2d');
		const bubbles = [];

		function resize() {
			bc.width  = window.innerWidth;
			bc.height = window.innerHeight;
		}
		resize();
		window.addEventListener('resize', resize);

		function spawnBubbles(x, y, count) {
			for (let i = 0; i < count; i++) {
				bubbles.push({
					x: x + (Math.random() - 0.5) * 30,
					y: y + (Math.random() - 0.5) * 10,
					r: Math.random() * 9 + 3,
					opacity: Math.random() * 0.45 + 0.3,
					vy: -(Math.random() * 1.2 + 0.4),
					wobble: Math.random() * Math.PI * 2,
					wobbleSpeed: (Math.random() - 0.5) * 0.08,
				});
			}
		}

		section.addEventListener('mousemove', e => spawnBubbles(e.clientX, e.clientY, 1));
		section.addEventListener('mousedown', e => spawnBubbles(e.clientX, e.clientY, 10));

		function drawBubbles() {
			bctx.clearRect(0, 0, bc.width, bc.height);
			for (let i = bubbles.length - 1; i >= 0; i--) {
				const b = bubbles[i];
				b.y += b.vy;
				b.wobble += b.wobbleSpeed;
				b.x += Math.sin(b.wobble) * 0.6;
				b.opacity -= 0.004;
				if (b.opacity <= 0 || b.y + b.r < 0) { bubbles.splice(i, 1); continue; }

				bctx.beginPath();
				bctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
				bctx.strokeStyle = `rgba(180, 220, 255, ${b.opacity})`;
				bctx.lineWidth = 1.5;
				bctx.stroke();

				bctx.beginPath();
				bctx.arc(b.x - b.r * 0.32, b.y - b.r * 0.32, b.r * 0.22, 0, Math.PI * 2);
				bctx.fillStyle = `rgba(255, 255, 255, ${b.opacity * 0.75})`;
				bctx.fill();
			}
			requestAnimationFrame(drawBubbles);
		}
		drawBubbles();
	</script>
</body>
</html>
